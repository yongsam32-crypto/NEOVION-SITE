<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEOVION 법인설립 체크시트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; background: #0f1117; color: #e2e8f0; padding: 24px 20px 40px; min-height: 100vh; }
.header { text-align: center; margin-bottom: 26px; }
.header h1 { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: .5px; }
.header p { font-size: 12px; color: #64748b; margin-top: 6px; }
.prog-wrap { background: #1e2433; border-radius: 20px; height: 9px; margin: 15px 0 5px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#3b82f6,#06b6d4); border-radius: 20px; transition: width .4s ease; }
.prog-text { font-size: 11px; color: #64748b; text-align: right; margin-bottom: 22px; }
.legend { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.b-hk { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed55; }
.b-vn { background: #dc262622; color: #f87171; border: 1px solid #dc262655; }
.b-cm { background: #0284c722; color: #38bdf8; border: 1px solid #0284c755; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.p-r { background: #ef4444; } .p-y { background: #f59e0b; } .p-g { background: #22c55e; }
.sec { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.sec-hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; background: #1e2537; user-select: none; }
.sec-hd:hover { background: #242b3e; }
.sec-left { display: flex; align-items: center; gap: 9px; }
.sec-title { font-size: 13px; font-weight: 600; color: #cbd5e1; }
.sec-cnt { font-size: 11px; color: #64748b; }
.chev { color: #64748b; font-size: 12px; transition: transform .25s; display: inline-block; }
.sec.open .chev { transform: rotate(180deg); }
.sec-body { display: none; }
.sec.open .sec-body { display: block; }
.item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 18px; cursor: pointer; border-bottom: 1px solid #1a1f2e; }
.item:hover { background: #1e2537; }
.item:last-child { border-bottom: none; }
.item.done { opacity: .45; }
.cb { width: 17px; height: 17px; min-width: 17px; border-radius: 4px; border: 2px solid #3b4a63; display: flex; align-items: center; justify-content: center; margin-top: 1px; flex-shrink: 0; }
.item.done .cb { background: #3b82f6; border-color: #3b82f6; }
.ck { color: #fff; font-size: 10px; display: none; }
.item.done .ck { display: block; }
.item-t { font-size: 12px; color: #cbd5e1; font-weight: 500; line-height: 1.45; }
.item.done .item-t { text-decoration: line-through; color: #4a5568; }
.item-d { font-size: 11px; color: #475569; margin-top: 2px; line-height: 1.5; }
.item.done .item-d { color: #2d3748; }
.reset { display: block; margin: 12px auto 0; background: transparent; border: 1px solid #2d3748; color: #64748b; padding: 7px 20px; border-radius: 8px; cursor: pointer; font-size: 11px; }
.reset:hover { border-color: #ef4444; color: #ef4444; }
</style>
</head>
<body>
<div class="header">
  <h1>🏢 NEOVION 법인설립 체크시트</h1>
  <p>홍콩 NEOVION Holdings (LLC 지주회사) &nbsp;·&nbsp; 베트남 NEOVION Group (주식회사)</p>
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-text" id="pt">0 / 0 완료</div>
</div>
<div class="legend">
  <div class="li"><span class="dot p-r"></span> 긴급·선행</div>
  <div class="li"><span class="dot p-y"></span> 중요</div>
  <div class="li"><span class="dot p-g"></span> 일반</div>
  <div class="li"><span class="badge b-hk">HK</span> 홍콩 법인</div>
  <div class="li"><span class="badge b-vn">VN</span> 베트남 법인</div>
  <div class="li"><span class="badge b-cm">공통</span></div>
</div>
<div id="cl"></div>
<button class="reset" onclick="resetAll()">↺ 전체 초기화</button>

<script>
const D = [
  { title:"① 법인 기본 설계·구조 확정", b:"cm", items:[
    {t:"지배구조 도식화 (HK → VN 지분구조 확정)", d:"NEOVION Holdings가 베트남 법인 지분 100% 보유 구조 여부 확정", p:"r"},
    {t:"주주 구성·지분율 확정", d:"각 주주별 출자비율·의결권 설계", p:"r"},
    {t:"사업목적 코드 정리 (베트남 업종코드)", d:"반도체설비·EPC·기자재유통·FFU·FMCS·초순수·데이터센터 등 업종 목록 정리", p:"r"},
    {t:"초기 자본금 규모 결정", d:"홍콩: 명목자본도 가능 / 베트남: 업종별 최소자본 요건 검토", p:"r"},
    {t:"회계연도·결산월 결정", d:"양 법인 회계연도 통일 여부 검토", p:"y"},
  ]},
  { title:"② 홍콩 — NEOVION Holdings LLC 설립", b:"hk", items:[
    {t:"법인 설립 대리인(비서회사) 선정", d:"홍콩 CR 등록 처리·회사비서 서비스 업체 계약", p:"r"},
    {t:"등록 주소지 확보", d:"홍콩 내 등록사무소 주소 (비서회사 제공 가능)", p:"r"},
    {t:"정관(Articles of Association) 작성", d:"지주회사 목적에 맞는 LLC 정관 초안 작성", p:"r"},
    {t:"회사 등기 (Companies Registry 제출)", d:"홍콩 회사 등기처 설립신청 / 보통 1~5 영업일 소요", p:"r"},
    {t:"사업자등록증 (Business Registration) 취득", d:"BR Certificate 발급", p:"r"},
    {t:"이사(Director) 선임 — 최소 1인", d:"자연인 이사 1인 이상 필수, 국적 제한 없음", p:"r"},
    {t:"법인 은행계좌 개설 (홍콩 현지 은행)", d:"HSBC·Hang Seng·OCBC 등 — KYC 서류 사전 준비", p:"r"},
    {t:"자본금 납입 및 납입증명 보관", d:"법인계좌 개설 후 약정 자본금 입금", p:"y"},
    {t:"IRD(내국세청) 세금 등록", d:"법인세 등록 및 첫 연도 세무신고 일정 파악", p:"y"},
    {t:"회사 인감·법인도장 제작", d:"홍콩 법인 공식 seal 제작", p:"g"},
  ]},
  { title:"③ 베트남 — NEOVION Group 주식회사(JSC) 설립", b:"vn", items:[
    {t:"외국인투자허가 (IRC) 신청", d:"Investment Registration Certificate — 업종별 조건부 허가 사전 확인 필수", p:"r"},
    {t:"사업등록허가 (ERC) 신청", d:"Enterprise Registration Certificate — IRC 취득 후 진행", p:"r"},
    {t:"현지 설립 대리인(로펌·컨설팅) 선정", d:"베트남 외투법인 설립 전문 로펌 선정 권장", p:"r"},
    {t:"등록 사무소 주소 확보", d:"사무소·공장 임대차 계약 체결 — 정식 주소 필수", p:"r"},
    {t:"정관 작성 (베트남어·영어 병기)", d:"주식회사 정관, 주주명부 초안", p:"r"},
    {t:"법정대표자(Legal Representative) 지정", d:"베트남 거주 법정대표 1인 지정 — 비자·거주허가 확인", p:"r"},
    {t:"법인세 코드(Tax Code) 등록", d:"ERC 취득 후 세무서 세금코드 발급", p:"r"},
    {t:"법인 은행계좌 개설 (베트남 현지)", d:"자본금 전용계좌(DICA) 개설", p:"r"},
    {t:"자본금 해외 송금 (홍콩 → 베트남)", d:"외환관리 절차 준수, 자본금 납입증명 보관", p:"r"},
    {t:"반도체설비·EPC 업종 허가 조건 확인", d:"조건부 업종 여부·건설업 면허 필요 여부 사전 확인", p:"r"},
    {t:"공장·사무소 부지 검토 및 임차", d:"박닌·하노이·HCMC 등 반도체 클러스터 인근 입지 검토", p:"y"},
    {t:"법인 도장(seal) 등록·제작", d:"베트남은 법인도장 등록·사용신고 필요", p:"y"},
    {t:"VAT 등록", d:"부가세 신고 방식(직접공제법) 선택 및 등록", p:"y"},
    {t:"사회보험·의료보험 가입 등록 (BHXH)", d:"직원 채용 전 사전 등록", p:"y"},
  ]},
  { title:"④ OEM·사업 준비 (FFU·EFU·FMCS 등)", b:"vn", items:[
    {t:"OEM 제조사 후보 리스트업 및 NDA 체결", d:"FFU(Fan Filter Unit)·EFU 제조사 접촉, 기밀유지협약 체결", p:"r"},
    {t:"OEM 계약서 초안 작성", d:"제조·납품·품질보증 조건 협의", p:"y"},
    {t:"FMCS·초순수설비·데이터센터 파트너 탐색", d:"현지 기술 파트너·합작 파트너 사전 접촉", p:"y"},
    {t:"제품 인증·규격 검토", d:"SEMICON 규격, 베트남 TCVN 인증 필요 여부 확인", p:"y"},
    {t:"수출입 관세 코드(HS Code) 정리", d:"반도체 설비·기자재 수입 관세율 사전 확인", p:"y"},
    {t:"EPC 사업 건설업 면허 검토", d:"설비설치·시공 관련 베트남 건설업 면허 필요 여부 확인", p:"y"},
  ]},
  { title:"⑤ 인사·조직 준비", b:"cm", items:[
    {t:"핵심 인력 채용 계획 수립", d:"법인장·영업·기술(반도체설비)·재무/회계 포지션 정의", p:"y"},
    {t:"취업비자·주재원 파견 계획 수립", d:"한국 주재원 베트남 WorkPermit·TRC 일정 계획", p:"y"},
    {t:"고용계약서 표준 양식 준비", d:"베트남 노동법상 필수 조항 포함 여부 검토", p:"y"},
    {t:"급여 체계·복리후생 설계", d:"로컬 직원·파견 직원 급여 구조 분리 설계", p:"g"},
  ]},
  { title:"⑥ 재무·세무·회계 준비", b:"cm", items:[
    {t:"회계법인 선정 (홍콩·베트남 각각)", d:"현지 외투법인 경험 있는 회계사무소 계약", p:"r"},
    {t:"이전가격(Transfer Pricing) 정책 수립", d:"홍콩 ↔ 베트남 법인 간 거래가격 정책 사전 설계", p:"y"},
    {t:"배당·로열티 송금 구조 설계", d:"홍콩-베트남 조세협약(DTT) 활용 배당세율 검토", p:"y"},
    {t:"회계 소프트웨어 도입", d:"MISA(베트남) 또는 세무신고 호환 시스템 도입", p:"y"},
    {t:"법인카드·경비처리 규정 마련", d:"초기 운영비 집행 기준 설정", p:"g"},
  ]},
  { title:"⑦ 브랜드·IP·계약 준비", b:"cm", items:[
    {t:"NEOVION 상표 등록 (홍콩·베트남·한국)", d:"설립 전 또는 동시 선출원 — 강력 권고 (선점 위험)", p:"r"},
    {t:"도메인·이메일 시스템 구축", d:"neovion.com 등 도메인 확보 및 법인 이메일 세팅", p:"y"},
    {t:"법인 표준계약서 셋 준비", d:"공급계약·NDA·에이전트계약·MOU 표준 양식 준비", p:"y"},
    {t:"회사 소개서·IR 자료 초안 작성", d:"투자자·파트너사 대상 기업소개 자료", p:"g"},
  ]},
];

const KEY = 'neovion_cl_v1';
function load() { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e){ return {}; } }
function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

function render() {
  const sv = load();
  const cl = document.getElementById('cl');
  cl.innerHTML = '';
  D.forEach((sec, si) => {
    const done = sec.items.filter((_,ii)=>sv[si+'-'+ii]).length;
    const el = document.createElement('div');
    el.className = 'sec'+(si===0?' open':'');
    const bc = sec.b==='hk'?'b-hk':sec.b==='vn'?'b-vn':'b-cm';
    const bl = sec.b==='hk'?'HK':sec.b==='vn'?'VN':'공통';
    el.innerHTML = `
      <div class="sec-hd" onclick="this.parentElement.classList.toggle('open')">
        <div class="sec-left">
          <span class="badge ${bc}">${bl}</span>
          <span class="sec-title">${sec.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="sec-cnt">${done}/${sec.items.length}</span>
          <span class="chev">▼</span>
        </div>
      </div>
      <div class="sec-body">
        ${sec.items.map((it,ii)=>`
          <div class="item${sv[si+'-'+ii]?' done':''}" onclick="tog(${si},${ii})">
            <span class="dot p-${it.p}" style="margin-top:4px;flex-shrink:0"></span>
            <div class="cb"><span class="ck">✓</span></div>
            <div>
              <div class="item-t">${it.t}</div>
              <div class="item-d">${it.d}</div>
            </div>
          </div>`).join('')}
      </div>`;
    cl.appendChild(el);
  });
  const total = D.reduce((a,s)=>a+s.items.length,0);
  const doneAll = Object.values(sv).filter(Boolean).length;
  document.getElementById('pf').style.width = (doneAll/total*100)+'%';
  document.getElementById('pt').textContent = doneAll+' / '+total+' 완료 ('+Math.round(doneAll/total*100)+'%)';
}

function tog(si,ii) {
  const s = load(); s[si+'-'+ii]=!s[si+'-'+ii]; save(s); render();
}
function resetAll() {
  if(confirm('모든 체크를 초기화할까요?')) { localStorage.removeItem(KEY); render(); }
}
render();
</script>
</body>
</html>
